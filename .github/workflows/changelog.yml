name: Changelog

on:
  push:
    branches: [main]

jobs:
  changelog:
    name: Update CHANGELOG
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit changelog
        # NOTE: This step pushes directly to main. If branch protection requires PR reviews,
        # add github-actions[bot] as a bypass actor in Settings > Branches > main protection rules.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs(ci): update CHANGELOG [skip ci]"
          git push
