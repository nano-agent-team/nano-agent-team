name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

  typecheck-agent-runner:
    name: Type check (agent-runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: container/agent-runner/package-lock.json

      - run: npm ci
        working-directory: container/agent-runner

      - run: npm run build
        working-directory: container/agent-runner

  typecheck-dashboard:
    name: Type check (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
        working-directory: dashboard

      - run: npm run build
        working-directory: dashboard

  build-features:
    name: Build features (${{ matrix.feature }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature: [settings, simple-chat, observability]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: features/${{ matrix.feature }}/frontend/package-lock.json

      - run: npm ci
        working-directory: features/${{ matrix.feature }}/frontend

      - run: npm run build
        working-directory: features/${{ matrix.feature }}/frontend

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
