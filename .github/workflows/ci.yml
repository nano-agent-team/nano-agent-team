name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

  typecheck-agent-runner:
    name: Type check (agent-runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: container/agent-runner/package-lock.json

      - run: npm ci
        working-directory: container/agent-runner

      - run: npm run build
        working-directory: container/agent-runner

  typecheck-dashboard:
    name: Type check (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
        working-directory: dashboard

      - run: npm run build
        working-directory: dashboard

  build-features:
    name: Build features (${{ matrix.feature }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature: [settings, simple-chat, observability]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: features/${{ matrix.feature }}/frontend/package-lock.json

      - run: npm ci
        working-directory: features/${{ matrix.feature }}/frontend

      - run: npm run build
        working-directory: features/${{ matrix.feature }}/frontend

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: nano-agent-team:latest
          cache-from: type=gha

      - name: Build agent image
        uses: docker/build-push-action@v5
        with:
          context: ./container
          push: false
          load: true
          tags: nano-agent:latest

      - name: Build test agent image
        uses: docker/build-push-action@v5
        with:
          context: ./tests/fixtures/test-agent
          push: false
          load: true
          tags: nano-test-agent:latest

      - name: Save agent images for DinD
        run: |
          docker save nano-agent:latest nano-test-agent:latest -o /tmp/nano-agent.tar

      - name: Prepare data directory
        run: |
          mkdir -p data
          cp tests/fixtures/ci-config.json data/config.json

      - name: Start app (DinD) with pre-built agent image
        run: |
          # Mount the pre-built agent tar so entrypoint can load it instead of building
          # Add volume mount for the tar file
          NANO_AGENT_TAR=/tmp/nano-agent.tar docker compose -f docker-compose.test.yml up -d

      - name: Wait for healthy
        run: |
          echo "Waiting for health check..."
          for i in $(seq 1 60); do
            status=$(curl -sf http://localhost:3001/api/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "App is ready (attempt $i)"
              echo "Waiting 10s for agents to fully start..."
              sleep 10
              exit 0
            fi
            echo "Attempt $i/60 — waiting 5s..."
            sleep 5
          done
          echo "Timeout — app failed to start"
          docker compose -f docker-compose.test.yml logs
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: API + NATS tests (Vitest)
        run: npx vitest run --exclude 'tests/api/multi-instance.test.ts'
        env:
          NATS_URL: nats://localhost:4222
          MOCK_RESPONSE: "Mock provider: task acknowledged."

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop app
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
