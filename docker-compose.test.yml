# docker-compose.test.yml — CI/CD testovací konfigurace
#
# Spuštění:
#   mkdir -p data && cp tests/fixtures/ci-config.json data/config.json
#   docker compose -f docker-compose.test.yml up -d
#
# Rozdíly oproti produkci:
#   - ./data bind mount (ne named volume) — multi-instance testy zapisují do ./data/ na hostu
#   - container_name: nate — multi-instance testy volají `docker exec nate`
#   - Namountuje předkonfigurovaný config.json (setupCompleted=true, primaryProvider=mock)
#   - Agenti používají MockProvider — žádné reálné LLM API volání
#   - Port 4222 (NATS) a 3003 (MCP Gateway) jsou vystavené pro integration testy
#   - restart: no (CI nepotřebuje auto-restart)

services:
  nano-agent-team:
    image: nano-agent-team:latest
    container_name: nate
    privileged: true
    restart: "no"
    stop_grace_period: 30s
    ports:
      - "3001:3001"
      - "4222:4222"     # NATS — pro integration testy
      - "3003:3003"     # MCP Gateway — pro ticket-pipeline testy
    volumes:
      - ./data:/data    # bind mount — testy mohou zapisovat do ./data/ a container vidí změny
    environment:
      LOG_LEVEL: warn
      MOCK_RESPONSE: "Mock provider: task acknowledged."
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
