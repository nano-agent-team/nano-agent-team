# docker-compose.test.yml — CI/CD testovací konfigurace
#
# Spuštění: docker compose -f docker-compose.test.yml up -d
#
# Rozdíly oproti produkci:
#   - Namountuje předkonfigurovaný config.json (setupCompleted=true, primaryProvider=mock)
#   - Agenti používají MockProvider — žádné reálné LLM API volání
#   - Port 4222 (NATS) je vystavený pro NATS integration testy
#   - restart: no (CI nepotřebuje auto-restart)

services:
  nano-agent-team:
    image: nano-agent-team:latest
    container_name: nate-test
    privileged: true
    restart: "no"
    stop_grace_period: 30s
    ports:
      - "3001:3001"
      - "4222:4222"     # NATS — pro integration testy
    volumes:
      - data:/data
      - ./tests/fixtures/ci-config.json:/data/config.json:ro
    environment:
      - LOG_LEVEL=warn
      - MOCK_RESPONSE=Mock provider: task acknowledged.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  data:
