# docker-compose.yml — single-container DinD deployment
#
# Spuštění:  docker compose up -d
# Více instancí:
#   PORT=3002 docker compose -p nano2 up -d

services:
  nano-agent-team:
    build:
      context: .
      dockerfile: Dockerfile
    image: nano-agent-team:latest
    container_name: ${COMPOSE_PROJECT_NAME:-nate}
    privileged: true          # required: internal dockerd needs /proc, cgroups, kernel namespaces (DinD)
    restart: unless-stopped
    stop_grace_period: 60s
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ${DATA_DIR:-./data}:/data  # persistentní data (sessions, vault, workspaces, DB)
      - ~/.claude:/root/.claude  # Claude Code credentials (dir auto-created by Docker if missing — run claude auth login to populate)
      - ~/.codex:/root/.codex    # Codex credentials (dir auto-created by Docker if missing — run codex auth to populate)
      # Self-update: host Docker socket + project source dir
      # These allow the Update button in Settings to rebuild and restart the container.
      # Data in /data is always preserved (volume mount above).
      - /var/run/docker.sock:/var/run/host-docker.sock
      - .:/host-source
    environment:
      DATA_DIR: /data
      HOST_DATA_DIR: /data
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
