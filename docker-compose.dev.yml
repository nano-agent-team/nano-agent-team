version: '3.9'

# Development compose — builds image locally, mounts ./data for persistence
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  nano-agent-team:
    build:
      context: .
      dockerfile: Dockerfile
    image: nano-agent-team:dev
    container_name: nano-agent-team
    restart: unless-stopped
    stop_grace_period: 60s
    # host networking required for OAuth callbacks (Claude, Codex) to reach localhost
    # Dev instance on port 3002 via API_PORT env (live instance uses 3001)
    network_mode: host
    volumes:
      # Persistent data: config, SQLite, sessions, vault, workspaces
      - ./data:/data
      # Docker socket — needed to spawn agent containers + self-update
      - /var/run/docker.sock:/var/run/docker.sock
      # Self-update: project source directory (for git pull + docker build)
      - .:/host-source
      # Local hub catalog mount — used for dev bootstrap (HUB_URL=file:///local-hub)
      - ../hub:/local-hub
      # Note: SSH keys are NOT mounted. git pull uses HTTPS (default for GitHub).
      # For SSH-based remotes, configure SSH agent forwarding on the host instead.
      # Claude Code credentials — shared with host so OAuth tokens persist
      - ~/.claude:/root/.claude
      # Claude Code 2.x auth file (OAuth token stored here, not inside .claude/)
      - ~/.claude.json:/root/.claude.json
      # Codex credentials — shared with host for subscription auth
      - ~/.codex:/root/.codex
    environment:
      DATA_DIR: /data
      HOST_DATA_DIR: ${PWD}/data
      LOG_LEVEL: info
      API_PORT: 3002
      MCP_GATEWAY_PORT: 3004
      HOST_CODEX_DIR: ${HOME}/.codex
      HOST_CLAUDE_JSON: ${HOME}/.claude.json
      SKIP_DOCKERD: "true"   # dev mode: use host Docker socket instead of internal dockerd
      # Hub catalog: use local mount for dev (no network dependency, uses current branch)
      HUB_URL: "file:///local-hub"
      # Embedded NATS (default — no NATS_URL needed)
      # To use external NATS: set NATS_URL=nats://nats:4222 and NATS_EMBEDDED=false
      # NATS_URL: nats://nats:4222
      # NATS_EMBEDDED: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
